<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>BugEzy — 截圖標注</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: system-ui, "Microsoft JhengHei", sans-serif; }

    /* 工具列（PM-104：橘光脈衝入場特效，由 popup「工具列特效」開關控制 → 加 .fx-on 才播）*/
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: #16213e;
      border: 2px solid #444;
    }
    .toolbar.fx-on {
      border-color: #ff8c00;
      box-shadow: 0 0 20px rgba(255, 140, 0, 0.8);
      animation: toolbar-orange-pulse 0.7s ease-in-out 10; /* 0.7×10 ≈ 7 秒 */
    }
    @keyframes toolbar-orange-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255, 140, 0, 0.3); border-color: #ff8c00; }
      50% { box-shadow: 0 0 30px rgba(255, 140, 0, 1), 0 0 60px rgba(255, 140, 0, 0.5); border-color: #ffaa00; }
    }
    /* 7 秒脈衝結束後：邊框退暗 + 常駐微光 */
    .toolbar.glow-settled {
      animation: none;
      border-color: #444;
      box-shadow: 0 2px 8px rgba(255, 140, 0, 0.15);
      transition: border-color 0.5s, box-shadow 0.5s;
    }
    .toolbar button {
      background: #333; color: #fff; border: 1px solid #555;
      border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 14px;
    }
    .toolbar button.active { background: #7c3aed; border-color: #7c3aed; }
    .toolbar button.save { background: #059669; border-color: #059669; font-weight: 600; }
    .toolbar button.cancel { background: #dc2626; border-color: #dc2626; }
    .toolbar .separator { width: 1px; height: 24px; background: #555; }
    .toolbar label { color: #aaa; font-size: 13px; }
    .toolbar input[type="color"] { width: 32px; height: 28px; border: none; cursor: pointer; background: none; }
    .toolbar select { background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 4px; }

    /* 畫布區 */
    .canvas-wrapper {
      flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center;
      background: #111;
    }
    .canvas-container { position: relative; display: inline-block; }
    .canvas-container canvas { display: block; cursor: crosshair; }

    /* 文字說明區（PM-20） */
    .description-area { padding: 8px 16px; background: #16213e; border-top: 1px solid #333; }
    .description-area label { display: block; color: #9aa3b2; font-size: 13px; margin-bottom: 4px; }
    .desc-row { display: flex; gap: 8px; align-items: stretch; }
    .desc-row textarea {
      flex: 1; background: #1a1a2e; color: #eee; border: 1px solid #444; border-radius: 6px;
      padding: 8px; font-size: 14px; font-family: system-ui, sans-serif; resize: vertical;
    }
    .desc-row textarea:focus { outline: none; border-color: #7c3aed; }
    .voice-btn {
      background: #333; color: #fff; border: 1px solid #555; border-radius: 6px;
      padding: 8px 12px; font-size: 20px; cursor: pointer; transition: all 0.15s;
    }
    .voice-btn.listening { background: #dc2626; border-color: #dc2626; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    /* PM-100：問題描述左邊的臨時「語音／鍵盤」快速切換鈕 */
    .voice-toggle-btn {
      background: #2a2a3e; border: 1px solid #555; border-radius: 8px;
      padding: 8px; font-size: 20px; cursor: pointer; flex-shrink: 0;
      transition: background 0.2s;
    }
    .voice-toggle-btn:hover { background: #3a3a5e; }
    .voice-toggle-btn.mic-on { background: #1a3a1a; border-color: #3fb950; }
    .voice-status { color: #9aa3b2; font-size: 12px; margin-top: 4px; min-height: 16px; }

    /* AI 精簡（PM-25） */
    .desc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .desc-header label { margin: 0; }
    .ai-btn {
      background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border: none;
      border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s;
    }
    .ai-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .ai-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    .ai-btn.done { background: linear-gradient(135deg, #059669, #047857); }

    /* 即時字幕（PM-21，浮在畫布底部，pointer-events:none 不擋畫圖） */
    #liveCaptions {
      position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%);
      z-index: 9999; pointer-events: none;
      background: rgba(0, 0, 0, 0.75); color: #fff; padding: 8px 20px;
      border-radius: 8px; font-size: 16px; max-width: 80%; text-align: center;
      transition: opacity 0.3s; line-height: 1.5;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    #liveCaptions.hidden { opacity: 0; }
    /* PM-205：Whisper 錄音音量條（5 條，安靜矮紅、講話綠色跳動，與 popup/inject 一致） */
    #volBars { display: flex; align-items: flex-end; gap: 2px; height: 20px; flex-shrink: 0; }
    #volBars.hidden { display: none; }
    #volBars .vol-bar { width: 4px; height: 4px; background: #ef4444; border-radius: 2px; transition: height 0.12s ease; }
    /* PM-185：馬賽克筆刷按鈕 + 敏感提示條 */
    .toolbar button.mosaic-btn { background: #f59e0b; color: #000; border-color: #f59e0b; }
    .toolbar button.mosaic-btn.active { background: #ef4444; border-color: #ef4444; color: #fff; box-shadow: 0 0 8px rgba(239,68,68,0.5); }
    .sensitive-tip { display: none; background: rgba(245,158,11,0.15); color: #f59e0b; border-bottom: 1px solid rgba(245,158,11,0.5); padding: 8px 16px; font-size: 13px; text-align: center; font-weight: 600; }
  </style>
</head>
<body>
  <div id="sensitiveTip" class="sensitive-tip"></div>
  <div class="toolbar">
    <button id="penTool" class="active" title="畫筆" data-i18n="annotate-pen">✏️ 畫筆</button>
    <button id="arrowTool" title="箭頭" data-i18n="annotate-arrow">➡️ 箭頭</button>
    <button id="rectTool" title="框框" data-i18n="annotate-rect">⬜ 框框</button>
    <button id="textTool" title="文字" data-i18n="annotate-text">📝 文字</button>
    <button id="mosaicTool" class="mosaic-btn" title="馬賽克" data-i18n="annotate-mosaic">🔒 馬賽克</button>
    <div class="separator"></div>
    <label data-i18n="annotate-color">顏色</label>
    <input type="color" id="colorPicker" value="#ff0000">
    <label data-i18n="annotate-thickness">粗細</label>
    <select id="lineWidth">
      <option value="2" data-i18n="annotate-thin">細</option>
      <option value="4" selected data-i18n="annotate-mid">中</option>
      <option value="8" data-i18n="annotate-thick">粗</option>
    </select>
    <div class="separator"></div>
    <button id="undoBtn" data-i18n="annotate-undo">↩️ 復原</button>
    <button id="clearBtn" data-i18n="annotate-clear">🗑️ 清除全部</button>
    <div style="flex:1"></div>
    <button id="cancelBtn" class="cancel" data-i18n="annotate-cancel">✗ 取消</button>
    <button id="saveBtn" class="save" data-i18n="annotate-next">📤 下一步</button>
  </div>
  <div class="canvas-wrapper">
    <div class="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <!-- 即時字幕（浮在畫布底部，不擋畫圖）（PM-21） -->
  <div id="liveCaptions" class="hidden">
    <span id="volBars" class="hidden">
      <span class="vol-bar"></span><span class="vol-bar"></span><span class="vol-bar"></span><span class="vol-bar"></span><span class="vol-bar"></span>
    </span>
    <span id="captionText" data-i18n="annotate-listening">🔴 聆聽中，邊畫邊說描述問題...</span>
  </div>
  <!-- 文字說明區（PM-20） -->
  <div class="description-area">
    <div class="desc-header">
      <label for="descInput" data-i18n="annotate-desc-label">💬 問題描述（選填）</label>
    </div>
    <div class="desc-row">
      <button id="voice-toggle" class="voice-toggle-btn" title="切換到鍵盤輸入">⌨️</button>
      <textarea id="descInput" placeholder="描述你看到的問題，或按右邊麥克風語音輸入..." data-i18n-ph="annotate-desc-ph" rows="3"></textarea>
      <button id="voiceInputBtn" class="voice-btn" title="語音輸入">🎤</button>
    </div>
    <div id="voiceStatus" class="voice-status"></div>
  </div>
  <script type="module" src="annotate.js"></script>
</body>
</html>
