<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>BugEzy — 報告編輯</title>
    <style>
      :root {
        --bg: #0f0f1a; --panel: #1a1a2e; --line: #2a2a3e; --fg: #f0f0f0;
        --muted: #8b8fa3; --accent: #7c3aed; --success: #10b981; --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
        font-size: 14px;
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 24px 20px 48px; }
      .brand { display: flex; align-items: center; gap: 8px; padding-bottom: 14px; margin-bottom: 18px; border-bottom: 1px solid var(--line); }
      .brand-icon { font-size: 24px; }
      .brand-name { font-size: 18px; font-weight: 700; color: var(--accent); }
      .brand-tag { font-size: 13px; color: var(--muted); }
      h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 18px 0 8px; }
      .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
      .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 16px; }
      .summary-grid div { font-size: 13px; }
      .summary-grid b { color: var(--accent); }
      textarea {
        width: 100%; background: var(--bg); color: var(--fg); border: 1px solid var(--line);
        border-radius: 8px; padding: 10px; font-size: 14px; font-family: inherit; resize: vertical;
      }
      textarea:focus { outline: none; border-color: var(--accent); }
      textarea[readonly] { color: var(--muted); }
      .desc-row { display: flex; gap: 8px; align-items: stretch; }
      .voice-btn { background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; padding: 8px 12px; font-size: 20px; cursor: pointer; }
      .voice-btn.listening { background: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      .voice-status { color: var(--muted); font-size: 12px; margin-top: 4px; min-height: 16px; }
      .actions { display: flex; gap: 12px; margin-top: 20px; }
      button.action { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; }
      .discard { background: #4a4a5e; }
      .upload { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
      button:disabled { opacity: 0.5; cursor: default; }
      #result { margin-top: 16px; }
      #result a { color: #a78bfa; word-break: break-all; }
      .hidden { display: none; }

      /* AI 精簡（PM-25） */
      .transcript-header { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 8px; }
      .transcript-header h2 { margin: 0; }
      .ai-btn {
        background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border: none;
        border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer;
        font-weight: 600; transition: all 0.15s;
      }
      .ai-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
      .ai-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
      .ai-btn.done { background: linear-gradient(135deg, #059669, #047857); }

      /* 時間軸標記（PM-28） */
      .mini-player-container {
        width: 100%; max-width: 960px;
        overflow: hidden; border-radius: 8px;
        border: 1px solid var(--line); margin-bottom: 8px;
        background: #000; /* 黑底讓縮放後邊緣不刺眼；高度改由 JS 依縮放動態設定 */
      }
      .mini-player-container iframe {
        border: none; transform-origin: top left; /* 尺寸/縮放由 JS 計算後 inline 設定 */
      }
      .marker-controls { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
      .btn-sm {
        padding: 4px 12px; font-size: 13px; border-radius: 6px;
        background: var(--panel); color: #fff;
        border: 1px solid var(--line); cursor: pointer;
      }
      .btn-accent { background: var(--accent); border-color: var(--accent); font-weight: 600; }
      /* 乾淨/原始 toggle（PM-46） */
      .toggle-label {
        display: flex; align-items: center; gap: 4px;
        font-size: 13px; color: #aaa; cursor: pointer; user-select: none;
        white-space: nowrap;
      }
      .toggle-label input[type='checkbox'] { accent-color: #7c3aed; }

      /* Token 估算面板（PM-55） */
      .token-panel {
        background: var(--panel); border: 1px solid rgba(124, 58, 237, 0.3);
        border-radius: 12px; padding: 16px; margin-bottom: 16px;
      }
      .token-row {
        display: flex; justify-content: space-between; padding: 4px 0;
        font-size: 13px; color: #ccc;
      }
      .token-row.total {
        border-top: 1px solid var(--line); margin-top: 8px; padding-top: 8px;
        font-weight: 700; color: #fff;
      }
      .token-row .label { color: #a78bfa; }
      .token-save {
        margin-top: 12px; padding: 10px;
        background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 8px; font-size: 13px; color: var(--success); text-align: center;
      }
      .time-display { font-family: monospace; color: var(--muted); font-size: 12px; white-space: nowrap; }
      .marker-list { margin-top: 8px; }
      .marker-item {
        display: flex; align-items: flex-start; gap: 8px;
        padding: 8px; margin: 4px 0;
        background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      }
      .marker-time {
        background: var(--accent); color: #fff; padding: 2px 8px;
        border-radius: 4px; font-size: 12px; font-family: monospace;
        white-space: nowrap; cursor: pointer;
      }
      .marker-time:hover { background: #6d28d9; }
      .marker-note {
        flex: 1; background: transparent; color: #eee;
        border: 1px solid var(--line); border-radius: 4px;
        padding: 4px 8px; font-size: 13px;
      }
      .marker-note:focus { outline: none; border-color: var(--accent); }
      .marker-delete { background: none; border: none; color: #888; cursor: pointer; font-size: 16px; }
      .marker-delete:hover { color: var(--danger); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <span class="brand-icon">🐛</span>
        <span class="brand-name">BugEzy</span>
        <span class="brand-tag">報告編輯</span>
      </div>

      <h2>📊 錄製摘要</h2>
      <div class="card summary-grid" id="summary"></div>

      <!-- 時間軸標記區（PM-28） -->
      <div id="markerSection">
        <h2>📌 時間軸標記</h2>
        <div class="marker-player">
          <div id="miniPlayer" class="mini-player-container"></div>
          <div class="marker-controls">
            <button id="markerPlayBtn" class="btn btn-sm">▶</button>
            <input type="range" id="markerSeek" min="0" max="100" value="0" style="flex:1;" />
            <span id="markerTime" class="time-display">0:00 / 0:00</span>
            <button id="zoomBtn" class="btn btn-sm" title="放大/縮小">🔍 2x</button>
            <label id="cleanToggle" class="toggle-label" title="切換乾淨/原始畫面">
              <input type="checkbox" id="cleanMode" checked />
              <span>🧹 乾淨模式</span>
            </label>
            <button id="addMarkerBtn" class="btn btn-sm btn-accent">📌 標記此刻</button>
          </div>
        </div>
        <div id="markerList" class="marker-list"></div>
      </div>

      <div class="transcript-header">
        <h2>🎤 語音記錄（自動辨識）</h2>
        <button id="summarizeBtn" class="ai-btn">🤖 AI 精簡</button>
      </div>
      <textarea id="voiceText" rows="3" placeholder="（這次錄製沒有語音）"></textarea>

      <h2>💬 補充說明（選填）</h2>
      <div class="desc-row">
        <textarea id="descInput" rows="3" placeholder="打字或按右邊麥克風語音補充..."></textarea>
        <button id="voiceBtn" class="voice-btn" title="語音輸入">🎤</button>
      </div>
      <div id="voiceStatus" class="voice-status"></div>

      <!-- Token 估算（PM-55） -->
      <div id="tokenEstimate" class="token-panel">
        <h2>📊 Token 估算</h2>
        <div id="tokenBreakdown"></div>
      </div>

      <div class="actions">
        <button id="discardBtn" class="action discard">✗ 捨棄報告</button>
        <button id="uploadBtn" class="action upload">✅ 上傳報告</button>
      </div>

      <div id="result" class="hidden"></div>
    </div>
    <link rel="stylesheet" href="edit-report.css" />
    <script type="module" src="edit-report.js"></script>
  </body>
</html>
