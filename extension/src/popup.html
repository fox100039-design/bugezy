<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BugEzy</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f1a;
        --panel: #1a1a2e;
        --line: #2a2a3e;
        --fg: #f0f0f0;
        --muted: #8b8fa3;
        --accent: #7c3aed;
        --accent-hover: #6d28d9;
        --success: #10b981;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
        background: var(--bg);
        color: var(--fg);
        font-size: 14px;
      }

      /* 品牌 Header */
      .brand {
        display: flex; align-items: center; gap: 8px;
        padding-bottom: 12px; margin-bottom: 12px;
        border-bottom: 1px solid var(--line);
      }
      .brand-icon { font-size: 24px; }
      .brand-name { font-size: 18px; font-weight: 700; color: var(--accent); }
      .brand-tag { font-size: 11px; color: var(--muted); margin-left: auto; }

      /* PM-86：麥克風 toggle（小型滑動開關，跟標題同行） */
      .mic-toggle { display: flex; align-items: center; gap: 6px; margin-left: 8px; }
      .mic-icon { font-size: 14px; transition: opacity 0.15s; }
      .mic-switch { position: relative; display: inline-block; width: 32px; height: 18px; }
      .mic-switch input { opacity: 0; width: 0; height: 0; }
      .mic-slider {
        position: absolute; inset: 0; cursor: pointer; background: #4a4a5e;
        border-radius: 18px; transition: background 0.15s;
      }
      .mic-slider::before {
        content: ''; position: absolute; height: 14px; width: 14px; left: 2px; top: 2px;
        background: #fff; border-radius: 50%; transition: transform 0.15s;
      }
      .mic-switch input:checked + .mic-slider { background: var(--success); }
      .mic-switch input:checked + .mic-slider::before { transform: translateX(14px); }

      /* PM-91：付費版語音模式切換（即時字幕 / 精準轉錄） */
      .mic-mode { display: flex; align-items: center; gap: 6px; margin: 4px 0 8px; padding: 4px 0; }
      .mic-mode-label { color: #9aa3b2; font-size: 11px; }
      .mic-mode-btn { width: auto; margin: 0; background: #2a2a3e; color: #999; border: 1px solid #333; border-radius: 12px; padding: 2px 10px; font-size: 11px; cursor: pointer; font-weight: 500; }
      .mic-mode-btn.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }

      /* 通用按鈕 */
      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        margin-bottom: 8px;
        transition: all 0.15s;
      }
      button:hover { filter: brightness(1.1); }
      button:disabled { opacity: 0.5; cursor: default; filter: none; }
      #stopBtn { background: var(--danger); }
      #copyBtn { background: #2563eb; }
      #copyBtn.copied { background: var(--success); }
      #exportBtn { background: var(--accent); }
      #exportBtn.done { background: var(--success); }
      #clearBtn { background: #4a4a5e; }

      /* 兩大入口（漸層 + hover 上浮） */
      .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 4px 0 8px; }
      .main-action {
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        padding: 20px 12px; border: none; border-radius: 12px;
        color: #fff; cursor: pointer; transition: all 0.2s ease; width: auto; margin: 0;
      }
      .main-action:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); filter: none; }
      .main-action.record { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
      .main-action.rewind { background: linear-gradient(135deg, #f59e0b, #d97706); }
      .main-action.screenshot { background: linear-gradient(135deg, #059669, #047857); }
      .action-icon { font-size: 32px; }
      .action-label { font-size: 15px; font-weight: 700; }
      .action-desc { font-size: 11px; opacity: 0.8; }

      /* PM-75b：!important 確保 .hidden 永遠勝過 .upgrade-hint/.manage-sub 等同特異度但後定義的 display:flex
         （否則 paid/cancelled 用戶加了 hidden 仍被 flex 蓋過、升級提示不會消失）。 */
      .hidden { display: none !important; }

      /* 鍵盤模式 toggle（PM-49） */
      .mode-toggle { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
      .toggle-row {
        display: flex; justify-content: space-between; align-items: center;
        font-size: 13px; color: var(--muted); cursor: pointer;
      }
      .toggle-row input[type='checkbox'] { accent-color: var(--accent); width: 18px; height: 18px; }
      .toggle-row + .toggle-row { margin-top: 8px; }

      /* 錄製中：大計時器 + 脈動圓點 */
      .recording-timer {
        text-align: center; font-size: 36px; font-weight: 700;
        font-family: ui-monospace, monospace; color: var(--danger); padding: 16px 0;
      }
      .rec-dot {
        display: inline-block; width: 12px; height: 12px;
        background: var(--danger); border-radius: 50%;
        margin-right: 10px; vertical-align: middle; animation: pulse 1s infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

      /* 完成摘要卡 */
      .done-title { color: var(--success); font-weight: 700; font-size: 15px; margin: 0 0 10px; }
      .summary-card {
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 12px; padding: 14px; margin: 10px 0;
      }
      .summary-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
      .summary-row .label { color: var(--muted); }
      .summary-row .value { font-weight: 600; }

      .meta { color: var(--muted); font-size: 11px; word-break: break-all; margin: 8px 0; }

      /* 分享連結卡 */
      .share-card {
        background: var(--panel); border: 1px solid var(--accent);
        border-radius: 12px; padding: 12px; margin: 10px 0;
        align-items: center; gap: 8px;
      }
      .share-card a { font-size: 12px; word-break: break-all; color: #a78bfa; flex: 1; }
      .link-btn {
        width: auto; margin: 0; flex-shrink: 0;
        background: var(--accent); border-radius: 6px; padding: 4px 10px; font-size: 12px;
      }

      /* PM-61：Google 登入 / 使用者列 */
      .login-hint { color: var(--muted); font-size: 13px; text-align: center; margin: 10px 0 16px; }
      .btn-google {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        background: #fff; color: #3c4043; font-weight: 600;
      }
      .btn-google:hover { filter: brightness(0.96); }
      .user-bar {
        display: flex; align-items: center; gap: 8px;
        padding-bottom: 10px; margin-bottom: 6px; border-bottom: 1px solid var(--line);
      }
      .avatar { border-radius: 50%; flex-shrink: 0; }
      #userName { font-size: 13px; color: var(--fg); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .btn-sm { width: auto; margin: 0; padding: 4px 10px; font-size: 12px; background: #4a4a5e; }

      /* PM-63：用量上限升級提示 */
      .upgrade-hint {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        margin: 8px 0; padding: 10px 12px; border-radius: 8px;
        background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.4);
        color: #fcd34d; font-size: 12px;
      }
      .btn-upgrade { width: auto; margin: 0; padding: 5px 14px; font-size: 12px; background: #f59e0b; }

      /* PM-75c：付費 / 已取消 兩種狀態徽章（三態互斥：free→upgradeHint、paid→paidBadge、cancelled→cancelledBadge） */
      .paid-badge {
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(124, 58, 237, 0.15); border: 1px solid #7c3aed; border-radius: 8px;
        padding: 8px 12px; font-size: 13px; color: #a78bfa; margin-bottom: 8px;
      }
      .cancelled-badge {
        display: flex; justify-content: space-between; align-items: center; gap: 8px;
        background: rgba(245, 158, 11, 0.15); border: 1px solid #f59e0b; border-radius: 8px;
        padding: 8px 12px; font-size: 13px; color: #f59e0b; margin-bottom: 8px;
      }
      .cancel-link { flex-shrink: 0; color: #888; font-size: 12px; cursor: pointer; text-decoration: underline; }
      .cancel-link:hover { color: #ef4444; }

      /* PM-71：版本更新通知 */
      .update-notice {
        background: linear-gradient(135deg, #7c3aed20, #10b98120);
        border: 1px solid #7c3aed;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        text-align: center;
      }
      .update-title {
        font-size: 16px;
        font-weight: 700;
        color: #a78bfa;
        margin-bottom: 6px;
      }
      .update-body {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 10px;
        line-height: 1.5;
      }
      .update-dismiss {
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 6px 20px;
        font-size: 13px;
        cursor: pointer;
        width: auto;
        margin: 0;
      }
      /* PM-111：日票升級雙按鈕 + 日票中倒數狀態 */
      .upgrade-section { display: flex; gap: 8px; margin-top: 8px; }
      .day-pass-btn { flex: 1; background: #f59e0b; color: #000; border: none; border-radius: 8px; padding: 8px 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
      .monthly-btn { flex: 1; background: #7c3aed; color: #fff; border: none; border-radius: 8px; padding: 8px 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
      .day-pass-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 0 0; }
      .day-pass-badge { background: #f59e0b; color: #000; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 8px; }
      .countdown { color: #f59e0b; font-size: 12px; font-family: monospace; }
      .day-pass-hint { color: #9aa3b2; font-size: 11px; text-align: center; margin: 4px 0 0; }
      /* PM-114：AI 慣用語輪盤 */
      .prompt-carousel { margin-top: 12px; padding: 10px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; }
      .prompt-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
      .prompt-title { color: #c9d1d9; font-size: 11px; font-weight: 600; flex: 1; }
      .prompt-index { color: #7c3aed; font-size: 11px; flex-shrink: 0; }
      .prompt-preview-row { display: flex; align-items: center; gap: 4px; }
      .prompt-nav { background: #2a2a3e; color: #fff; border: 1px solid #444; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
      .prompt-nav:hover { background: #3a3a5e; }
      /* PM-115：預覽 wrap（顏色點 + 文字），複製鈕移到右側 */
      .prompt-preview-wrap { flex: 1; display: flex; align-items: center; gap: 6px; background: #0d1117; padding: 8px 10px; border-radius: 6px; border: 1px solid #21262d; overflow: hidden; }
      .prompt-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .prompt-preview { flex: 1; color: #e6edf3; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .prompt-copy-btn { background: #7c3aed; border: none; border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
      .prompt-copy-btn:hover { background: #6d28d9; }
      .prompt-actions { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
      .prompt-edit-btn { background: #2a2a3e; color: #ccc; border: 1px solid #444; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
      /* PM-115：編輯模式顏色選擇列 */
      .prompt-color-picker { display: flex; gap: 8px; margin-bottom: 8px; }
      .color-option { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
      .color-option:hover { border-color: #fff; }
      .color-option.selected { border-color: #fff; }
      .prompt-editor { margin-top: 8px; }
      .prompt-textarea { width: 100%; background: #0d1117; color: #e6edf3; border: 1px solid #7c3aed; border-radius: 8px; padding: 8px; font-size: 12px; font-family: inherit; resize: vertical; box-sizing: border-box; }
      .prompt-editor-actions { display: flex; gap: 8px; margin-top: 6px; }
      .prompt-save-btn { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
      .prompt-cancel-btn { background: transparent; color: #888; border: 1px solid #444; border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
      .prompt-copied { color: #3fb950; font-size: 11px; flex-shrink: 0; }
      /* PM-107：mic OFF 按錄製提示層 */
      .mic-prompt {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        display: flex; align-items: center; justify-content: center; z-index: 9999;
      }
      .mic-prompt-card {
        background: #1a1a2e; border: 1px solid #7c3aed; border-radius: 16px;
        padding: 24px; text-align: center; max-width: 280px;
      }
      .mic-prompt-icon { font-size: 36px; margin-bottom: 8px; }
      .mic-prompt-title { color: #fff; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
      .mic-prompt-desc { color: #9aa3b2; font-size: 13px; margin-bottom: 16px; }
      .mic-prompt-btn {
        display: block; width: 100%; padding: 10px; border-radius: 10px; border: none;
        font-size: 14px; cursor: pointer; margin-bottom: 8px;
      }
      .mic-prompt-btn.primary { background: #7c3aed; color: #fff; font-weight: 600; }
      .mic-prompt-btn.secondary { background: transparent; color: #888; border: 1px solid #444; }
    </style>
  </head>
  <body>
    <!-- 未登入：Google 登入（PM-61）-->
    <section id="loginView" class="hidden">
      <div class="brand" style="justify-content:center;">
        <span class="brand-icon">🐛</span>
        <span class="brand-name">BugEzy</span>
      </div>
      <p class="login-hint">登入後開始使用</p>
      <button id="googleLoginBtn" class="btn-google">
        <img src="https://developers.google.com/identity/images/g-logo.png" width="18" alt="" />
        用 Google 登入
      </button>
    </section>

    <!-- 已登入：使用者列 + 現有功能 -->
    <div id="mainView" class="hidden">
      <div class="user-bar">
        <img id="userAvatar" class="avatar" width="24" height="24" alt="" />
        <span id="userName"></span>
        <button id="logoutBtn" class="btn-sm">登出</button>
      </div>
      <div class="brand">
        <span class="brand-icon">🐛</span>
        <span class="brand-name">BugEzy</span>
        <div class="mic-toggle" title="麥克風語音輸入（一次授權，所有網站通用）">
          <span class="mic-icon" id="micIcon">🎙️</span>
          <label class="mic-switch">
            <input type="checkbox" id="micToggle" />
            <span class="mic-slider"></span>
          </label>
        </div>
        <span class="brand-tag">語音 Bug 回報</span>
      </div>
      <div class="mic-mode" id="micMode" style="display:none;">
        <span class="mic-mode-label">語音模式</span>
        <button class="mic-mode-btn" data-mode="realtime">即時字幕</button>
        <button class="mic-mode-btn" data-mode="whisper">精準轉錄</button>
      </div>
      <!-- PM-106：錄製中設定鎖定提示 -->
      <div id="settingsHint" style="display:none;font-size:11px;color:#f59e0b;text-align:center;margin:2px 0 0;">🔒 錄製中，設定已鎖定</div>

    <!-- 狀態一：閒置（兩個獨立入口） -->
    <section id="idleView" class="hidden">
      <div class="action-grid">
        <button id="startBtn" class="main-action record">
          <span class="action-icon">🎬</span>
          <span class="action-label">錄製</span>
          <span class="action-desc">DOM + 語音 + Console</span>
        </button>
        <button id="rewindBtn" class="main-action rewind">
          <span class="action-icon">⏪</span>
          <span class="action-label">回溯 30s</span>
          <span class="action-desc">抓剛才的 Bug</span>
        </button>
        <button id="screenshotBtn" class="main-action screenshot">
          <span class="action-icon">📸</span>
          <span class="action-label">截圖標注</span>
          <span class="action-desc">快速擷取 + 畫重點</span>
        </button>
      </div>
      <div id="lastScreenshot" class="meta" style="display:none;"></div>
      <div id="upgradeHint" class="upgrade-hint hidden">
        <span>升級解鎖無限次</span>
        <div class="upgrade-section">
          <button id="dayPassBtn" class="day-pass-btn">⚡ 日票 NT$20（24hr）</button>
          <button id="upgradeBtn" class="monthly-btn">✨ 月費 NT$80/月</button>
        </div>
      </div>
      <div id="dayPassStatus" class="day-pass-status hidden">
        <span class="day-pass-badge">⚡ 日票</span>
        <span id="dayPassCountdown" class="countdown"></span>
      </div>
      <p id="dayPassHint" class="day-pass-hint hidden">日票到期後可升級月費</p>
      <div id="paidBadge" class="paid-badge hidden">
        <span>✨ 付費版</span>
        <a id="cancelSubBtn" class="cancel-link">取消訂閱</a>
      </div>
      <div id="cancelledBadge" class="cancelled-badge hidden">
        <span>已取消訂閱，可用到 <span id="expiresDate"></span></span>
        <a id="resubBtn" class="cancel-link">重新訂閱</a>
      </div>
      <div class="mode-toggle">
        <label class="toggle-row">
          <span>🔍 即時監控（AI 可查 error）</span>
          <input type="checkbox" id="monitorMode" />
        </label>
        <label class="toggle-row">
          <span>🔇 鍵盤模式（關閉語音）</span>
          <input type="checkbox" id="keyboardMode" />
        </label>
        <label class="toggle-row">
          <span>📸 高畫質 AI 分析（高 Token）</span>
          <input type="checkbox" id="allowScreenshots" />
        </label>
        <label class="toggle-row">
          <span>✨ 工具列特效</span>
          <input type="checkbox" id="toolbarEffect" />
        </label>
      </div>

      <!-- PM-114/115：AI 慣用語輪盤（4 則可編輯 + 顏色標記 + 一鍵複製；複製鈕右側） -->
      <div class="prompt-carousel">
        <div class="prompt-header">
          <span class="prompt-title">一鍵快速複製指令貼給你的 AI</span>
          <button id="prompt-copy" class="prompt-copy-btn" title="複製">📋</button>
          <span id="prompt-copied" class="prompt-copied" style="display:none;">✅</span>
          <span class="prompt-index" id="prompt-index">1/4</span>
        </div>
        <div class="prompt-preview-row">
          <button id="prompt-prev" class="prompt-nav">◀</button>
          <div class="prompt-preview-wrap">
            <span class="prompt-color-dot" id="prompt-color-dot"></span>
            <span class="prompt-preview" id="prompt-preview">請讀取我最新的 BugEzy 報告...</span>
          </div>
          <button id="prompt-next" class="prompt-nav">▶</button>
        </div>
        <div class="prompt-actions">
          <button id="prompt-edit" class="prompt-edit-btn">✏️ 編輯</button>
        </div>
        <div id="prompt-editor" class="prompt-editor" style="display:none;">
          <div class="prompt-color-picker" id="prompt-color-picker">
            <span class="color-option" data-color="#ef4444" style="background:#ef4444;"></span>
            <span class="color-option" data-color="#3b82f6" style="background:#3b82f6;"></span>
            <span class="color-option" data-color="#22c55e" style="background:#22c55e;"></span>
            <span class="color-option" data-color="#f59e0b" style="background:#f59e0b;"></span>
          </div>
          <textarea id="prompt-textarea" class="prompt-textarea" rows="5"></textarea>
          <div class="prompt-editor-actions">
            <button id="prompt-save" class="prompt-save-btn">💾 儲存</button>
            <button id="prompt-cancel" class="prompt-cancel-btn">取消</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 狀態二：錄製中 -->
    <section id="recordingView" class="hidden">
      <div class="recording-timer"><span class="rec-dot"></span><span id="elapsed">00:00</span></div>
      <button id="stopBtn">⏹ 停止錄製</button>
    </section>

    <!-- 狀態三：錄製完成 -->
    <section id="doneView" class="hidden">
      <div class="done-title">✅ 錄製完成！</div>
      <div class="summary-card">
        <div class="summary-row"><span class="label">DOM 事件</span><span class="value" id="domCount">0</span></div>
        <div class="summary-row"><span class="label">Console</span><span class="value" id="consoleCount">0</span></div>
        <div class="summary-row"><span class="label">Network 錯誤</span><span class="value" id="networkCount">0</span></div>
        <div class="summary-row"><span class="label">語音片段</span><span class="value" id="voiceCount">0</span></div>
        <div class="summary-row"><span class="label">時間</span><span class="value" id="durationVal">0 秒</span></div>
        <div class="meta" id="pageUrl"></div>
      </div>

      <!-- 上傳狀態 -->
      <div id="uploadArea">
        <div id="uploadStatus" class="meta"></div>
        <div id="shareUrlRow" class="share-card" style="display:none;">
